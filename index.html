<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#121826" />
  <title>홀수짝수 맞추기</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="top-bar">
      <div>
        <h1>홀수짝수 맞추기</h1>
        <p class="subtitle">선택한 홀수/짝수만 빠르게 터치하세요</p>
      </div>
    </header>

    <section class="panel setup-panel">
      <h2>게임 설정</h2>

      <div class="mode-select">
        <button id="selectOdd" class="mode-btn" type="button">홀수 선택</button>
        <button id="selectEven" class="mode-btn" type="button">짝수 선택</button>
      </div>

      <div class="action-row action-row-3">
        <button id="startGame" class="primary-btn" type="button">게임 시작</button>
        <button id="restartGame" class="secondary-btn" type="button">다시 시작</button>
        <button id="endGame" class="danger-btn" type="button">게임 종료</button>
      </div>

      <p id="message" class="message">홀수 또는 짝수를 선택하고 시작하세요.</p>
    </section>

    <section class="stats">
      <div class="stat-box">
        <span>남은 시간</span>
        <strong id="timer">30</strong>
      </div>
      <div class="stat-box">
        <span>총 점수</span>
        <strong id="score">0</strong>
      </div>
      <div class="stat-box">
        <span>현재 판 점수</span>
        <strong id="stageScore">0</strong>
      </div>
      <div class="stat-box">
        <span>스테이지</span>
        <strong id="stage">1</strong>
      </div>
      <div class="stat-box">
        <span>선택</span>
        <strong id="targetMode">-</strong>
      </div>
      <div class="stat-box">
        <span>최고 점수</span>
        <strong id="bestScore">0</strong>
      </div>
      <div class="stat-box full">
        <span>다음 판 조건</span>
        <strong>현재 판에서 15점 이상</strong>
      </div>
    </section>

    <section class="panel board-panel">
      <div id="gameBoard" class="game-board" aria-label="게임 보드"></div>
    </section>

    <section class="guide">
      <p>규칙: 1~100 숫자가 잠깐 나타납니다. 선택한 종류만 터치하면 +1점, 틀리면 -1점입니다.</p>
      <p>다음 스테이지로 가려면 <strong>그 스테이지 안에서만</strong> 15점 이상을 획득해야 합니다.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
